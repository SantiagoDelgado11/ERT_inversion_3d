inversion:
  observations:
    path: null
    format: auto
    delimiter: ","
    skiprows: 0
    comment_prefix: "#"
    has_header: false
    point_columns: [0, 1, 2]
    value_column: 3
    point_column_names: null
    value_column_name: null
    coordinate_scale: null
    coordinate_offset: null
    value_scale: 1.0
    value_offset: 0.0
    npz_point_key: points
    npz_value_key: potential
    drop_invalid_rows: false

  optimizer:
    lr: 0.0005
    weight_decay: 0.0

  loss_weights:
    data: 1.0
    pde: 1.0
    bc: 1.0
    reg: 1.0
    flux: 1.0

  regularization:
    tv_eps: 1.0e-8

  source_model:
    current: 1.0
    gaussian_epsilon: 0.05
    flux_control_radius: 0.05
    flux_surface_points: 256
    fixed_electrode_pair: [0, 1]

  boundary_conditions:
    dirichlet_face: z_max
    dirichlet_value: 0.0
    neumann_faces: [x_min, x_max, y_min, y_max, z_min]
    neumann_target_flux: 0.0

  log_every: 20
