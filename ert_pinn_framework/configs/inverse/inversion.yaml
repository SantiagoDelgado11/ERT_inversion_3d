inversion:
  observations:
    path: null
    delimiter: ","
    skiprows: 0
    point_columns: [0, 1, 2]
    value_column: 3

  optimizer:
    lr: 0.0005
    weight_decay: 0.0

  regularization:
    tv_eps: 1.0e-8

  source_model:
    current: 1.0
    gaussian_epsilon: 0.05
    flux_control_radius: 0.05
    flux_surface_points: 256
    fixed_electrode_pair: [0, 1]

  boundary_conditions:
    dirichlet_face: z_max
    dirichlet_value: 0.0
    neumann_faces: [x_min, x_max, y_min, y_max, z_min]
    neumann_target_flux: 0.0

  log_every: 20
