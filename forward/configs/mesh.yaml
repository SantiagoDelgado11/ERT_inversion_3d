mesh:
  # Base cell sizes in meters
  hx: 2.0
  hy: 2.0
  hz: 2.0

  # Number of core cells
  nx: 50  # 100 meters
  ny: 20  # 40 meters
  nz: 20  # 40 meters depth

  # Padding cells to push boundaries to infinity
  pad_x: 5
  pad_y: 5
  pad_z: 5

  # Expansion factor for padding cells
  expansion_rate: 1.5
